<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0d12;
color:white;
overflow:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 40%, #1f2a44aa, transparent 45%),
           radial-gradient(circle at 40% 80%, #111a33aa, transparent 50%),
           linear-gradient(120deg,#0b0d12,#0f1424);
background-size:200% 200%;
animation:bg 14s ease-in-out infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= APP ================= */
.app{
display:flex;
height:100vh;
}

/* ================= LEFT ================= */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

.logo{
width:50px;
height:50px;
border-radius:12px;
background:rgba(255,255,255,0.05);
background-image:url("YOUR_LOGO.png");
background-size:cover;
background-position:center;
}

.icon{
width:42px;
height:42px;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* ================= LIST ================= */
.list{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.item:hover{
background:rgba(255,255,255,0.06);
}

/* ================= CENTER ================= */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
position:sticky;
top:0;
background:#0b0d12;
z-index:5;
padding:10px 0;
}

.title{
font-family:Montserrat,sans-serif;
font-weight:800;
font-size:18px;
}

.status{
font-size:12px;
opacity:0.7;
}

.dot{
width:6px;
height:6px;
background:#00ff88;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* LIVE */
.live{
margin-top:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
}

/* CARD */
.card{
margin-top:10px;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.box{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
min-height:110px;
}

/* MAP */
iframe{
width:100%;
height:180px;
border-radius:12px;
border:none;
}

/* ================= RIGHT ================= */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
overflow:auto;
}

/* SOCIAL */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.04);
}

/* ================= MOBILE BOTTOM ================= */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.95);
border-top:1px solid rgba(255,255,255,0.08);
z-index:999;
}

.bottom div{
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
}

/* ================= MOBILE FULL APP ================= */
@media(max-width:900px){

.left,.list,.right{
display:none;
}

.app{
flex-direction:column;
height:100vh;
}

.center{
height:calc(100vh - 60px);
padding:10px;
overflow:auto;
}

/* ВСІ VIEW ВИДИМІ НА МОБІЛІ */
.view{
display:block !important;
}

.bottom{
display:grid;
}

}

/* VIEW SYSTEM */
.view{display:none;}
.view.active{display:block;}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- LIST -->
<div class="list">
<div class="item" onclick="openView('news')">Новини</div>
<div class="item" onclick="openView('transport')">Транспорт</div>
<div class="item" onclick="openView('urgent')">Тривоги</div>
<div class="item" onclick="openView('weather')">Погода</div>
<div class="item" onclick="openView('map')">Карта</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="header">
<div class="logo"></div>
<div>
<div class="title">BorykNews</div>
<div class="status"><span class="dot"></span>online • live</div>
</div>
</div>

<!-- NEWS -->
<div id="news" class="view active">

<div class="live">LIVE Бориспіль інформує 24/7</div>

<div class="card">Новина міста: транспорт оновлено</div>
<div class="card">Терміново: повітряна тривога</div>
<div class="card">Погода: +12°C</div>

</div>

<!-- TRANSPORT -->
<div id="transport" class="view">
<div class="box">Transport LIVE BLOCK</div>
</div>

<!-- URGENT -->
<div id="urgent" class="view">
<div class="box">Air alert system LIVE</div>
</div>

<!-- WEATHER -->
<div id="weather" class="view">
<div class="box">Weather API SLOT (OpenWeather)</div>
</div>

<!-- MAP -->
<div id="map" class="view">
<iframe src="https://alerts.in.ua/"></iframe>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Соцмережі</h3>

<div class="social">
<a></a>
<a></a>
<a></a>
<a></a>
</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<div onclick="openView('news')">News</div>
<div onclick="openView('transport')">Transport</div>
<div onclick="openView('urgent')">Alerts</div>
<div onclick="openView('map')">Map</div>
</div>

<script>
function openView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
