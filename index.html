<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BorykNews Telegram UI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0f1115;
color:#fff;
overflow-x:hidden;
}

/* TOP BAR */
.header{
position:fixed;
top:0;
left:0;
right:0;
height:60px;
background:rgba(20,22,28,0.9);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-weight:900;
font-size:18px;
color:#c41c1e;
letter-spacing:1px;
}

.menu-btn{
width:38px;
height:38px;
border-radius:10px;
background:#1b1f2a;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
}

.menu-btn:hover{
transform:scale(1.1);
background:#2a2f3d;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#151824;
padding:20px;
transition:.4s;
z-index:2000;
}

.sidebar.active{
left:0;
}

.sidebar h3{
margin-bottom:15px;
color:#c41c1e;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
padding:10px;
margin:5px 0;
border-radius:8px;
transition:.3s;
}

.sidebar a:hover{
background:#2a2f3d;
}

/* MAIN */
.container{
padding-top:80px;
padding-bottom:80px;
max-width:900px;
margin:auto;
}

/* STORIES */
.stories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.story{
min-width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(45deg,#c41c1e,#ff5a5a);
display:flex;
align-items:center;
justify-content:center;
animation:pulse 2s infinite;
cursor:pointer;
}

.story img{
width:62px;
height:62px;
border-radius:50%;
object-fit:cover;
border:2px solid #111;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* POSTS */
.post{
background:#151824;
margin:15px;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.post img{
width:100%;
height:200px;
object-fit:cover;
}

.post-content{
padding:12px;
}

.post-title{
font-weight:700;
margin-bottom:5px;
}

.post-text{
font-size:13px;
opacity:.8;
}

/* BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:rgba(20,22,28,0.95);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid rgba(255,255,255,0.05);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:11px;
opacity:.7;
cursor:pointer;
transition:.3s;
}

.nav-item:hover{
opacity:1;
transform:translateY(-2px);
}

.icon{
width:22px;
height:22px;
margin-bottom:4px;
background:#2a2f3d;
border-radius:6px;
}

/* FLOAT BTN */
.fab{
position:fixed;
right:20px;
bottom:90px;
width:55px;
height:55px;
border-radius:50%;
background:#c41c1e;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 10px 25px rgba(196,28,30,0.5);
transition:.3s;
}

.fab:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="logo">BorykNews</div>
<div class="menu-btn">⚙</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h3>Меню</h3>
<a href="#">Головна</a>
<a href="#">Новини</a>
<a href="#">Фото</a>
<a href="#">Соцмережі</a>
<a href="#">Контакти</a>
</div>

<!-- STORIES -->
<div class="container">

<div class="stories">
<div class="story"><img src="https://via.placeholder.com/100"></div>
<div class="story"><img src="https://via.placeholder.com/101"></div>
<div class="story"><img src="https://via.placeholder.com/102"></div>
<div class="story"><img src="https://via.placeholder.com/103"></div>
</div>

<!-- POSTS -->
<div class="post">
<img src="https://via.placeholder.com/800x400">
<div class="post-content">
<div class="post-title">Головна новина дня</div>
<div class="post-text">Тут буде твій текст новини у стилі Telegram feed.</div>
</div>
</div>

<div class="post">
<img src="https://via.placeholder.com/801x401">
<div class="post-content">
<div class="post-title">Оновлення BorykNews</div>
<div class="post-text">Місце для твоїх новин, фото або оголошень.</div>
</div>
</div>

</div>

<!-- FLOAT BUTTON -->
<div class="fab">＋</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<div class="nav-item">
<div class="icon"></div>
Головна
</div>

<div class="nav-item">
<div class="icon"></div>
Чати
</div>

<div class="nav-item">
<div class="icon"></div>
Медіа
</div>

<div class="nav-item">
<div class="icon"></div>
Профіль
</div>
</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
