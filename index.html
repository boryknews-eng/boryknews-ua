<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#070A10;
color:white;
overflow:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 20%, #ff2d5520, transparent 35%),
radial-gradient(circle at 80% 40%, #2d7dff20, transparent 40%),
radial-gradient(circle at 40% 80%, #00ffb320, transparent 45%),
linear-gradient(120deg,#070A10,#0b1220);
background-size:200% 200%;
animation:move 14s ease infinite;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= APP ================= */
.app{
display:flex;
height:100vh;
}

/* ================= LEFT BAR ================= */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

.logo{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(135deg,#ff2d55,#2d7dff);
}

.icon{
width:42px;
height:42px;
border-radius:12px;
background:rgba(255,255,255,0.05);
transition:.2s;
cursor:pointer;
}

.icon:hover{
transform:scale(1.1);
background:rgba(255,255,255,0.1);
}

/* ================= LIST ================= */
.list{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:.2s;
}

.item:hover{
background:rgba(255,255,255,0.08);
}

/* ================= CENTER ================= */
.center{
flex:1;
overflow:auto;
padding:16px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
padding:10px 0;
position:sticky;
top:0;
backdrop-filter:blur(20px);
background:rgba(7,10,16,0.7);
z-index:5;
}

.title{
font-family:Montserrat;
font-size:18px;
font-weight:800;
}

.status{
font-size:12px;
opacity:0.7;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#00ff88;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* ================= LIVE ================= */
.live{
margin-top:12px;
padding:16px;
border-radius:16px;
background:linear-gradient(135deg,rgba(255,45,85,0.15),rgba(45,125,255,0.1));
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* ================= CARDS ================= */
.card{
margin-top:10px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
transition:.2s;
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
background:rgba(255,255,255,0.07);
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.box{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
min-height:120px;
}

/* ================= MAP ================= */
iframe{
width:100%;
height:180px;
border-radius:14px;
border:none;
}

/* ================= RIGHT ================= */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
}

/* ================= SOCIAL ================= */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:44px;
border-radius:12px;
background:rgba(255,255,255,0.04);
display:flex;
align-items:center;
justify-content:center;
transition:.2s;
}

.social a:hover{
background:rgba(255,255,255,0.1);
}

/* ================= MOBILE ================= */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(0,0,0,0.6);
backdrop-filter:blur(25px);
border-top:1px solid rgba(255,255,255,0.08);
}

.bottom div{
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* ================= MOBILE FIX ================= */
@media(max-width:900px){

.left,.list,.right{
display:none;
}

.app{
flex-direction:column;
height:auto;
}

.center{
padding:12px;
}

.grid{
grid-template-columns:1fr;
}

.bottom{
display:grid;
}

iframe{
height:220px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<!-- LEFT -->

<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>

<div class="icon"></div>

</div>

</div>

<!-- RIGHT -->

</a>

<!-- Facebook -->

</a>

</a>

<!-- YouTube -->

</a>

</div>

</div>

</div>

<!-- MOBILE -->

<div>News</div>
<div>Transport</div>
<div>Alerts</div>
<div>Map</div>
</div>

</body>
</html>
