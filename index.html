<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>BorykNews Telegram Premium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0f0f13;
color:#fff;
height:100vh;
overflow:hidden;
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:360px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
backdrop-filter:blur(20px);
}

/* HEADER */
.sidebar-header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:50px;
height:50px;
border-radius:14px;
}

.logo h1{
font-size:18px;
}

.logo p{
font-size:12px;
color:#aaa;
}

.plus{
width:44px;
height:44px;
border:none;
border-radius:12px;
background:#c41c1e;
color:#fff;
font-size:22px;
}

/* STORIES */
.stories{
display:flex;
gap:12px;
padding:12px;
overflow-x:auto;
}

.story{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.story img{
width:54px;
height:54px;
border-radius:50%;
border:2px solid #c41c1e;
}

/* CHATS */
.chats{
flex:1;
overflow:auto;
padding:10px;
}

.chat{
display:flex;
gap:12px;
padding:12px;
border-radius:14px;
cursor:pointer;
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

.chat img{
width:48px;
height:48px;
border-radius:12px;
}

/* RIGHT */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:rgba(255,255,255,0.04);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:42px;
height:42px;
border-radius:12px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
}

.btn{
width:42px;
height:42px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
cursor:pointer;
}

/* SOCIAL */
.social{
display:none;
position:absolute;
top:60px;
right:10px;
background:#111;
border-radius:12px;
padding:10px;
width:220px;
z-index:999;
}

.social a{
display:flex;
gap:10px;
padding:8px;
color:#fff;
text-decoration:none;
}

/* MESSAGES */
.messages{
flex:1;
padding:14px;
overflow:auto;
padding-bottom:110px;
}

.msg{
max-width:70%;
padding:10px 12px;
border-radius:12px;
margin-bottom:10px;
word-break:break-word;
}

.sent{background:#c41c1e;margin-left:auto}
.received{background:rgba(255,255,255,0.08)}

/* INPUT */
.input{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:8px;
padding:10px;
background:rgba(10,10,12,0.95);
border-top:1px solid rgba(255,255,255,0.08);
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
outline:none;
}

.input button{
width:46px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
cursor:pointer;
}

/* MOBILE FIX (ВАУ АДАПТАЦІЯ) */
@media(max-width:900px){

.sidebar{
display:none;
}

.chat-area{
width:100%;
}

.messages{
padding:12px;
padding-bottom:120px;
}

.input{
padding:8px;
gap:6px;
}

}

/* SCROLL */
.messages::-webkit-scrollbar{
width:6px;
}

.messages::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.2);
border-radius:10px;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-header">

<div class="logo">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<h1>BorykNews</h1>
<p>Telegram Premium</p>
</div>
</div>

<button class="plus">+</button>

</div>

<div class="stories">

<div class="story">
<img src="https://i.pravatar.cc/100?img=11">
<span>News</span>
</div>

<div class="story">
<img src="https://i.pravatar.cc/100?img=12">
<span>Chat</span>
</div>

<div class="story">
<img src="https://i.pravatar.cc/100?img=13">
<span>AI</span>
</div>

</div>

<div class="chats">

<div class="chat">
<img src="https://i.pravatar.cc/100?img=5">
<div>BorykNews</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=15">
<div>Оголошення</div>
</div>

</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="header">

<div class="user">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<b>BorykNews</b>
<div style="font-size:12px;color:#00ff95">● online</div>
</div>
</div>

<div class="actions">

<button class="btn" onclick="window.location.href='tel:+380975973256'">📞</button>
<button class="btn" onclick="toggle()">⋮</button>

</div>

</div>

<!-- SOCIAL -->
<div class="social" id="social">

<a href="https://www.instagram.com/boryknews/">Instagram</a>
<a href="https://www.facebook.com/BorykNews/">Facebook</a>
<a href="https://x.com/BorykNews">X</a>
<a href="https://t.me/BorykNews">Telegram</a>

</div>

<!-- MESSAGES -->
<div class="messages">

<div class="msg received">👋 Це відновлений Telegram Premium UI</div>
<div class="msg sent">Тепер виглядає як треба 🔥</div>

</div>

<!-- INPUT -->
<div class="input">

<input placeholder="Написати...">
<button>➤</button>

</div>

</div>

</div>

<script>

function toggle(){
let s=document.getElementById("social");
s.style.display=s.style.display==="block"?"none":"block";
}

Telegram.WebApp.expand();

</script>

</body>
</html>
