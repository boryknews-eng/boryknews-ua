<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0d12;
color:white;
font-family:'Manrope',sans-serif;
overflow:hidden;
}

/* ===== BACKGROUND ===== */
.bg{
position:fixed;
inset:0;
background:linear-gradient(-45deg,#0b0d12,#111a2e,#1a1233,#0a1b2b);
background-size:400% 400%;
animation:bg 15s infinite ease;
z-index:-1;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ===== LAYOUT ===== */
.app{
display:flex;
height:100vh;
}

/* ===== ICON SPRITE ===== */
.icon{
width:34px;
height:34px;
background-image:url("/mnt/data/a_set_of_five_digital_icons_is_displayed_on_a_dark.png");
background-repeat:no-repeat;
background-size:1536px 1024px;
}

/* 5 іконок (1 ряд) */
.i1{background-position:0px 0px;}
.i2{background-position:-307px 0px;}
.i3{background-position:-614px 0px;}
.i4{background-position:-921px 0px;}
.i5{background-position:-1228px 0px;}

/* ===== SIDEBAR ===== */
.sidebar{
width:90px;
background:rgba(20,22,30,.8);
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
align-items:center;
padding:12px 0;
gap:18px;
}

.menu{
width:60px;
height:60px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
background:rgba(255,255,255,.05);
}

.menu:hover{
background:#c41c1e;
transform:scale(1.05);
}

/* ===== CHAT ===== */
.chats{
width:320px;
background:rgba(18,20,28,.75);
overflow:auto;
}

.chat{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.05);
cursor:pointer;
}

.chat:hover{
background:rgba(255,255,255,.05);
}

/* ===== CENTER ===== */
.center{
flex:1;
overflow:auto;
padding:20px;
}

.post{
background:white;
color:black;
border-radius:20px;
overflow:hidden;
max-width:600px;
}

/* ===== RIGHT ===== */
.right{
width:340px;
background:rgba(18,20,28,.75);
overflow:auto;
padding:15px;
}

/* ===== MOBILE ===== */
@media(max-width:900px){

body{overflow:auto;}

.app{
flex-direction:column;
height:auto;
}

.sidebar{
flex-direction:row;
width:100%;
justify-content:space-around;
}

.chats,.right{
width:100%;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- SIDEBAR ICONS (YOUR PACK) -->
<div class="sidebar">

<div class="menu"><div class="icon i1"></div></div>
<div class="menu"><div class="icon i2"></div></div>
<div class="menu"><div class="icon i3"></div></div>
<div class="menu"><div class="icon i4"></div></div>
<div class="menu"><div class="icon i5"></div></div>

</div>

<!-- CHATS -->
<div class="chats">
<div class="chat">🚨 Термінові новини</div>
<div class="chat">🚌 Транспорт</div>
<div class="chat">🏙 Місто</div>
</div>

<!-- CENTER -->
<div class="center">
<div class="post">
<div style="padding:15px;font-weight:800;">BorykNews LIVE</div>
<img src="https://i.imgur.com/qj6F6Q4.jpeg" style="width:100%">
<div style="padding:15px;">
Тут твоя новина буде виглядати як Telegram стиль 🚀
</div>
</div>
</div>

<!-- RIGHT -->
<div class="right">
<h3>LIVE</h3>
<p>⚠️ Оновлення міста</p>
<p>💡 Світло</p>
<p>🚨 Тривога</p>
</div>

</div>

</body>
</html>
