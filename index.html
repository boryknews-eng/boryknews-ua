<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BorykNews AI Chat</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0b0b10;color:#fff;height:100vh;overflow:hidden}

/* APP */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:300px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.chat{
display:flex;
gap:10px;
padding:12px;
cursor:pointer;
}

.chat img{
width:45px;height:45px;border-radius:12px;
}

/* CHAT */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(255,255,255,0.04);
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:42px;height:42px;border-radius:12px;
}

/* SOCIALS */
.actions{
display:flex;
gap:8px;
}

.btn{
width:42px;height:42px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
cursor:pointer;
}

.btn img{
width:22px;height:22px;
}

/* MESSAGES */
.messages{
flex:1;
padding:12px;
overflow:auto;
padding-bottom:100px;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:12px;
margin-bottom:10px;
}

.sent{background:#c41c1e;margin-left:auto}
.received{background:rgba(255,255,255,0.08)}

/* INPUT */
.input{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:8px;
padding:10px;
background:rgba(10,10,12,0.95);
border-top:1px solid rgba(255,255,255,0.08);
}

.input input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
}

.input button{
width:46px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="chat">
<img src="https://i.pravatar.cc/100?img=5">
<div>BorykNews AI</div>
</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="header">

<div class="user">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<div><b>BorykNews AI</b></div>
<div style="font-size:12px;color:#00ff95">● AI online</div>
</div>
</div>

<div class="actions">

<!-- CALL -->
<button class="btn" onclick="window.location.href='tel:+380975973256'">
<img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">
</button>

<!-- SOCIALS -->
<button class="btn" onclick="toggleSocial()">
<img src="https://cdn-icons-png.flaticon.com/512/545/545682.png">
</button>

</div>

</div>

<!-- SOCIAL PANEL -->
<div class="social-panel" id="social" style="display:none;position:absolute;top:60px;right:10px;background:#111;padding:10px;border-radius:12px">

<a href="https://www.instagram.com/boryknews/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="20"> Instagram
</a><br>

<a href="https://www.facebook.com/BorykNews/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="20"> Facebook
</a><br>

<a href="https://x.com/BorykNews" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" width="20"> X
</a><br>

<a href="https://t.me/BorykNews" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="20"> Telegram
</a>

</div>

<!-- MESSAGES -->
<div class="messages" id="messages">

<div class="msg received">
👋 Hi! I am BorykNews AI Assistant
</div>

</div>

<!-- INPUT -->
<div class="input">

<input id="text" placeholder="Ask about news, ads, beauty, services..."
onkeydown="if(event.key==='Enter')send()">

<button onclick="send()">➤</button>

</div>

</div>

</div>

<script>

function send(){

let t=document.getElementById("text");
if(!t.value)return;

addMsg(t.value,"sent");

setTimeout(()=>aiReply(t.value),600);

t.value="";
}

function addMsg(text,type){
let m=document.createElement("div");
m.className="msg "+type;
m.innerText=text;
document.getElementById("messages").appendChild(m);
}

function aiReply(text){

let t=text.toLowerCase();
let reply="🤖 I don't understand";

if(t.includes("новини") || t.includes("news")){
reply="📰 News: Бориспіль – головні події, ДТП, транспорт, політика";
}

else if(t.includes("оголош")){
reply="📢 Ads: нерухомість, робота, авто, земля, оренда";
}

else if(t.includes("нерух")){
reply="🏠 Real Estate: квартири, будинки, земля, оренда";
}

else if(t.includes("beauty") || t.includes("краса") || t.includes("салон")){
reply="💇 Beauty: hair salons, barbershops, brows, nails, permanent makeup";
}

else if(t.includes("services") || t.includes("послуг")){
reply="🛠 Services: ремонт, клінінг, доставка, будівництво, техніка";
}

else if(t.includes("привіт")){
reply="👋 Hello! Ask me about News, Ads, Beauty, Services";
}

addMsg(reply,"received");
}

function toggleSocial(){
let s=document.getElementById("social");
s.style.display = s.style.display==="block"?"none":"block";
}

Telegram.WebApp.expand();

</script>

</body>
</html>
