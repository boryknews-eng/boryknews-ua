<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BorykNews Telegram</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

html,body{
width:100%;
height:100vh;
overflow:hidden;
background:#0b0b10;
color:#fff;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#c41c1e33,transparent 30%),
radial-gradient(circle at bottom right,#2563eb33,transparent 30%),
#0b0b10;
}

/* APP */

.app{
display:flex;
height:100vh;
position:relative;
z-index:2;
}

/* SIDEBAR */

.sidebar{
width:380px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(30px);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

/* TOP */

.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
display:flex;
gap:12px;
align-items:center;
}

.logo img{
width:54px;
height:54px;
border-radius:18px;
}

.logo h1{
font-size:20px;
font-weight:800;
}

.plus{
width:48px;
height:48px;
border:none;
border-radius:16px;
background:#c41c1e;
color:#fff;
font-size:22px;
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
height:46px;
border-radius:14px;
border:none;
outline:none;
padding:0 14px;
background:rgba(255,255,255,0.06);
color:#fff;
}

/* STORIES */

.stories{
display:flex;
gap:12px;
padding:15px;
overflow-x:auto;
}

.story{
text-align:center;
font-size:12px;
}

.story img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid #c41c1e;
}

/* CHATS */

.chats{
flex:1;
overflow-y:auto;
padding:10px;
}

.chat{
display:flex;
gap:12px;
padding:12px;
border-radius:14px;
cursor:pointer;
}

.chat:hover{
background:rgba(255,255,255,0.05);
}

.avatar img{
width:50px;
height:50px;
border-radius:18px;
}

.name{
font-weight:700;
}

.preview{
font-size:13px;
opacity:0.7;
}

/* CHAT AREA */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.04);
}

.user{
display:flex;
align-items:center;
gap:12px;
}

.user img{
width:50px;
height:50px;
border-radius:16px;
}

.typing{
font-size:12px;
color:#00ff95;
}

/* SOCIALS */

.socials{
display:flex;
gap:10px;
padding:10px 15px;
}

.socials img{
width:24px;
height:24px;
}

/* MESSAGES */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
max-width:70%;
padding:12px 16px;
border-radius:18px;
margin-bottom:12px;
}

.received{
background:rgba(255,255,255,0.08);
}

.sent{
background:#c41c1e;
margin-left:auto;
}

/* INPUT */

.input{
display:flex;
gap:10px;
padding:12px;
background:rgba(255,255,255,0.04);
}

.input input{
flex:1;
height:46px;
border-radius:14px;
border:none;
outline:none;
padding:0 12px;
background:rgba(255,255,255,0.06);
color:#fff;
}

.send{
width:46px;
height:46px;
border:none;
border-radius:14px;
background:#c41c1e;
color:#fff;
}

/* MOBILE FIX */

@media(max-width:900px){

.sidebar{display:none;}

.input{
position:fixed;
bottom:0;
left:0;
right:0;
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="top">
<div class="logo">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200">
<div>
<h1>BorykNews</h1>
</div>
</div>

<button class="plus">+</button>
</div>

<div class="search">
<input placeholder="Пошук...">
</div>

<div class="stories">
<div class="story">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200">
<div>BorykNews</div>
</div>

<div class="story">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
<div>Telegram</div>
</div>

</div>

<div class="chats">

<div class="chat">
<div class="avatar">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200">
</div>
<div>
<div class="name">BorykNews</div>
<div class="preview">🚨 Останні новини Борисполя</div>
</div>
</div>

<div class="chat">
<div class="avatar">
<img src="https://images.unsplash.com/photo-1500648767791?w=200">
</div>
<div>
<div class="name">Оголошення</div>
<div class="preview">🏠 Нерухомість та вакансії</div>
</div>
</div>

</div>

</div>

<!-- CHAT AREA -->

<div class="chat-area">

<div class="header">

<div class="user">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200">
<div>
<div><b>BorykNews</b></div>
<div class="typing">● онлайн</div>
</div>
</div>

</div>

<div class="socials">

<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">

</div>

<div class="messages">

<div class="msg received">
🚨 У Борисполі затори через ремонт доріг
</div>

<div class="msg sent">
📸 Читачі вже надсилають фото з місця подій
</div>

<div class="msg received">
🏠 Нові оголошення вже на BorykNews
</div>

</div>

<div class="input">

<input placeholder="Написати повідомлення...">

<button class="send">➤</button>

</div>

</div>

</div>

<script>
Telegram.WebApp.expand();
</script>

</body>
</html>
