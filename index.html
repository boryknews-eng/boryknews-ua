<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews REAL AI</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#0b0b10;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
}

.messages{
flex:1;
overflow:auto;
padding:12px;
}

.msg{
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:80%;
}

.user{background:#c41c1e;margin-left:auto}
.ai{background:rgba(255,255,255,0.08)}

.input{
display:flex;
padding:10px;
background:#111;
gap:8px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#222;
color:#fff;
outline:none;
}

button{
width:60px;
border:none;
border-radius:8px;
background:#c41c1e;
color:#fff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<b>BorykNews REAL AI</b>
<div>● online</div>
</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="text" placeholder="Напиши запит...">
<button onclick="send()">➤</button>
</div>

<script>

const API_KEY = "PASTE_YOUR_OPENAI_KEY_HERE"; // ⚠️ сюди ключ

function addMsg(text,cls){
let m=document.createElement("div");
m.className="msg "+cls;
m.innerText=text;
document.getElementById("messages").appendChild(m);
}

async function send(){

let input=document.getElementById("text");
let text=input.value;
if(!text)return;

addMsg(text,"user");
input.value="";

addMsg("⏳ Думаю...","ai");

let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:
"Ти AI помічник BorykNews. Відповідай українською. Теми: новини, оголошення, нерухомість, beauty, послуги."
},
{role:"user",content:text}
]
})
});

let data = await res.json();

document.querySelectorAll(".msg.ai").forEach(e=>{
if(e.innerText==="⏳ Думаю...") e.remove();
});

let reply = data.choices?.[0]?.message?.content || "Помилка AI";

addMsg(reply,"ai");
}

Telegram.WebApp.expand();

</script>

</body>
</html>
