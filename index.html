<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews AI News</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#0b0b10;color:#fff;height:100vh;overflow:hidden}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:300px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
padding:12px;
}

/* CHAT */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.04);
}

.btn{
padding:10px 14px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
cursor:pointer;
}

.messages{
flex:1;
padding:14px;
overflow:auto;
}

.news{
background:rgba(255,255,255,0.08);
padding:14px;
border-radius:14px;
margin-bottom:10px;
}

.input{
padding:10px;
display:flex;
gap:10px;
background:rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">
<h3>BorykNews AI</h3>
<p>🧠 Auto News System</p>
</div>

<div class="chat-area">

<div class="header">
<b>AI Новини</b>
<button class="btn" onclick="generateNews()">📰 Згенерувати новину</button>
</div>

<div class="messages" id="messages">

<div class="news">👋 Натисни кнопку щоб AI створив новину</div>

</div>

</div>

</div>

<script>

const API_KEY = "PASTE_YOUR_OPENAI_KEY";

function addNews(text){
let d=document.createElement("div");
d.className="news";
d.innerText=text;
document.getElementById("messages").prepend(d);
}

async function generateNews(){

addNews("⏳ AI генерує новину...");

let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:
`Ти редактор новин BorykNews.
Створи коротку новину українською.
Теми: Бориспіль, нерухомість, оголошення, послуги, beauty.
Формат:
📰 Заголовок
📍 Місце
📝 Текст 3-5 речень`
},
{
role:"user",
content:"Згенеруй новину"
}
]
})
});

let data = await res.json();

let news = data?.choices?.[0]?.message?.content
|| "Помилка генерації новини";

document.querySelector(".news").remove();

addNews(news);

}

Telegram.WebApp.expand();

</script>

</body>
</html>
