<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0d12;
color:white;
overflow:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 40%, #1f2a44aa, transparent 45%),
           radial-gradient(circle at 40% 80%, #111a33aa, transparent 50%),
           linear-gradient(120deg,#0b0d12,#0f1424);
background-size:200% 200%;
animation:bg 14s ease-in-out infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= APP ================= */
.app{
display:flex;
height:100vh;
}

/* ================= LEFT ================= */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

.logo{
width:50px;
height:50px;
border-radius:12px;
background:rgba(255,255,255,0.05);
background-image:url("YOUR_LOGO.png");
background-size:cover;
background-position:center;
}

.icon{
width:42px;
height:42px;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* ================= LIST ================= */
.list{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.item:hover{
background:rgba(255,255,255,0.06);
}

/* ================= CENTER ================= */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
position:sticky;
top:0;
background:#0b0d12;
z-index:5;
padding:10px 0;
}

.title{
font-family:Montserrat,sans-serif;
font-weight:800;
font-size:18px;
}

.status{
font-size:12px;
opacity:0.7;
}

.dot{
width:6px;
height:6px;
background:#00ff88;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* LIVE */
.live{
margin-top:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
}

/* CARD */
.card{
margin-top:10px;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.box{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
min-height:110px;
}

/* MAP */
iframe{
width:100%;
height:180px;
border-radius:12px;
border:none;
}

/* ================= RIGHT ================= */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
overflow:auto;
}

/* SOCIAL */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.04);
}

/* ================= MOBILE BOTTOM ================= */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.95);
border-top:1px solid rgba(255,255,255,0.08);
z-index:999;
}

.bottom div{
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
}

/* ================= MOBILE FIX (ВАЖЛИВО) ================= */
@media(max-width:900px){

body{
overflow:auto;
}

/* НІЧОГО НЕ ХОВАЄМО */
.left,
.list,
.right{
display:flex;
width:100%;
}

/* вертикальний режим */
.app{
flex-direction:column;
height:auto;
}

/* LEFT як верхня панель */
.left{
flex-direction:row;
justify-content:space-around;
padding:10px 0;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* LIST повна ширина */
.list{
width:100%;
}

/* CENTER */
.center{
width:100%;
padding:10px;
}

/* RIGHT вниз */
.right{
width:100%;
border-left:none;
border-top:1px solid rgba(255,255,255,0.05);
}

/* GRID в 1 колонку */
.grid{
grid-template-columns:1fr;
}

/* MAP більше */
iframe{
height:220px;
}

/* bottom bar включаємо */
.bottom{
display:grid;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- LIST -->
<div class="list">
<div class="item">Новини</div>
<div class="item">Транспорт</div>
<div class="item">Тривоги</div>
<div class="item">Погода</div>
<div class="item">Карта</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="header">
<div class="logo"></div>
<div>
<div class="title">BorykNews</div>
<div class="status"><span class="dot"></span>online • live</div>
</div>
</div>

<div class="live">LIVE Бориспіль інформує 24/7</div>

<div class="card">Новина міста: транспорт оновлено</div>
<div class="card">Терміново: повітряна тривога</div>
<div class="card">Погода: +12°C</div>

<div class="grid">

<div class="box">Transport LIVE</div>
<div class="box">Weather LIVE SLOT</div>
<div class="box">Alerts LIVE</div>
<div class="box">
<iframe src="https://alerts.in.ua/"></iframe>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Соцмережі</h3>

<div class="social">
<a></a>
<a></a>
<a></a>
<a></a>
</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<div>News</div>
<div>Transport</div>
<div>Alerts</div>
<div>Map</div>
</div>

</body>
</html>
