<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews Telegram Style</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0d12;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 40%, #1f2a44aa, transparent 45%),
           radial-gradient(circle at 40% 80%, #111a33aa, transparent 50%),
           linear-gradient(120deg,#0b0d12,#0f1424);
background-size:200% 200%;
animation:bg 14s ease-in-out infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* LEFT ICON BAR */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

.icon{
width:44px;
height:44px;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* CHAT LIST */
.list{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:.2s;
}

.item:hover{
background:rgba(255,255,255,0.06);
}

/* CENTER */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:48px;
height:48px;
border-radius:12px;
background:rgba(255,255,255,0.05);
}

.title{
font-weight:800;
font-size:18px;
}

.status{
font-size:12px;
opacity:0.7;
}

.dot{
width:6px;
height:6px;
background:#00ff88;
border-radius:50%;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* VIEW BLOCKS */
.view{
margin-top:12px;
display:none;
}

.view.active{
display:block;
}

/* NEWS */
.card{
padding:14px;
margin-top:10px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.box{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
min-height:120px;
}

/* MAP */
iframe{
width:100%;
height:200px;
border-radius:12px;
border:none;
}

/* RIGHT PANEL */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
overflow:auto;
}

/* SOCIAL REAL ICONS (SVG INLINE) */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:42px;
border-radius:10px;
background:rgba(255,255,255,0.04);
display:flex;
align-items:center;
justify-content:center;
}

.social svg{
width:20px;
height:20px;
fill:white;
opacity:0.9;
}

/* MOBILE */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.95);
border-top:1px solid rgba(255,255,255,0.06);
}

.bottom div{
height:55px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* RESPONSIVE */
@media(max-width:900px){

.left,.list,.right{
display:none;
}

.bottom{
display:grid;
}

.app{
flex-direction:column;
height:auto;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- LIST -->
<div class="list">

<div class="item" onclick="openView('news')">Новини</div>
<div class="item" onclick="openView('transport')">Транспорт</div>
<div class="item" onclick="openView('urgent')">Тривоги</div>
<div class="item" onclick="openView('weather')">Погода</div>
<div class="item" onclick="openView('map')">Карта</div>

</div>

<!-- CENTER -->
<div class="center">

<div class="header">
<div class="logo"></div>
<div>
<div class="title">BorykNews</div>
<div class="status"><span class="dot"></span>online • live system</div>
</div>
</div>

<!-- NEWS -->
<div id="news" class="view active">

<div class="card">Новина міста: оновлено транспорт</div>
<div class="card">Терміново: повітряна тривога</div>
<div class="card">Економіка: нові зміни в тарифах</div>

</div>

<!-- TRANSPORT -->
<div id="transport" class="view">

<div class="box">LIVE транспортний блок</div>

</div>

<!-- URGENT -->
<div id="urgent" class="view">

<div class="box">Повітряні тривоги (LIVE)</div>

</div>

<!-- WEATHER -->
<div id="weather" class="view">

<div class="box">
Weather LIVE SLOT (API OpenWeather тут)
</div>

</div>

<!-- MAP -->
<div id="map" class="view">

<iframe src="https://alerts.in.ua/"></iframe>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Навігація</h3>

<div class="social">

<!-- Telegram -->
<a href="#">
<svg viewBox="0 0 24 24"><path d="M9.04 15.47l-.39 5.5c.56 0 .8-.24 1.09-.53l2.6-2.48 5.4 3.96c.99.55 1.7.26 1.95-.92l3.52-16.46h0c.31-1.44-.52-2.01-1.49-1.65L1.6 9.37C.2 9.94.21 10.77 1.3 11.1l5.47 1.7L18.8 5.64c.62-.39 1.19-.18.72.22"/></svg>
</a>

<!-- Facebook -->
<a href="#">
<svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.5 9.95v-7.05H8v-3h2.5V9.5A3.5 3.5 0 0 1 14 6h2v3h-2c-.55 0-1 .45-1 1v2h3l-.5 3H13v7A10 10 0 0 0 22 12"/></svg>
</a>

<!-- Instagram -->
<a href="#">
<svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 6a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm6-1a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg>
</a>

<!-- YouTube -->
<a href="#">
<svg viewBox="0 0 24 24"><path d="M10 15l5.19-3L10 9v6zm12-3c0-2.21-.18-3.89-.5-5.5-.2-1-1-1.7-2-1.9C17.3 4 12 4 12 4s-5.3 0-7.5.6c-1 .2-1.8.9-2 1.9C2.18 8.11 2 9.79 2 12s.18 3.89.5 5.5c.2 1 1 1.7 2 1.9C6.7 20 12 20 12 20s5.3 0 7.5-.6c1-.2 1.8-.9 2-1.9.32-1.61.5-3.29.5-5.5z"/></svg>
</a>

</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<div onclick="openView('news')">News</div>
<div onclick="openView('transport')">Transport</div>
<div onclick="openView('urgent')">Alerts</div>
<div onclick="openView('map')">Map</div>
</div>

<script>
function openView(id){
document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
