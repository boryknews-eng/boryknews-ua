<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BorykNews Messenger</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#0f1115;
height:100vh;
overflow:hidden;
display:flex;
color:white;
}

/* ===== SIDEBAR ===== */

.sidebar{
width:88px;
background:#17191f;
display:flex;
flex-direction:column;
align-items:center;
padding:14px 0;
gap:14px;
border-right:1px solid rgba(255,255,255,.05);
z-index:20;
}

.logo{
width:58px;
height:58px;
border-radius:22px;
background:linear-gradient(135deg,#c41c1e,#ff4747);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
box-shadow:0 15px 40px rgba(196,28,30,.45);
}

.menu-btn{
width:58px;
height:58px;
border-radius:22px;
background:#232731;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:24px;
transition:.3s;
position:relative;
}

.menu-btn:hover{
transform:translateY(-3px);
background:#c41c1e;
}

.menu-btn.active{
background:#c41c1e;
}

.menu-btn span{
position:absolute;
left:72px;
background:#20242d;
padding:10px 14px;
border-radius:14px;
font-size:13px;
white-space:nowrap;
opacity:0;
transition:.3s;
pointer-events:none;
font-weight:700;
}

.menu-btn:hover span{
opacity:1;
left:80px;
}

/* ===== CHATS ===== */

.chats{
width:360px;
background:#16181d;
border-right:1px solid rgba(255,255,255,.05);
display:flex;
flex-direction:column;
overflow:auto;
}

.search{
padding:18px;
}

.search input{
width:100%;
height:54px;
border:none;
background:#232731;
border-radius:18px;
padding:0 18px;
color:white;
font-size:15px;
outline:none;
}

.chat-list{
padding-bottom:30px;
}

.chat-item{
display:flex;
gap:14px;
padding:16px 18px;
cursor:pointer;
transition:.3s;
border-left:3px solid transparent;
}

.chat-item:hover{
background:#20232b;
}

.chat-item.active{
background:#222733;
border-left:3px solid #c41c1e;
}

.chat-item img{
width:60px;
height:60px;
border-radius:20px;
object-fit:cover;
}

.chat-name{
font-weight:800;
font-size:15px;
}

.chat-last{
font-size:13px;
color:#9ca3af;
margin-top:5px;
line-height:1.4;
}

/* ===== CENTER ===== */

.center{
flex:1;
display:flex;
flex-direction:column;
background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
}

.topbar{
height:78px;
background:rgba(0,0,0,.25);
backdrop-filter:blur(14px);
display:flex;
align-items:center;
padding:0 22px;
font-weight:900;
font-size:19px;
border-bottom:1px solid rgba(255,255,255,.05);
gap:16px;
}

.back{
display:none;
font-size:25px;
cursor:pointer;
}

.messages{
padding:28px;
overflow:auto;
height:100%;
}

.post{
max-width:520px;
background:white;
color:black;
border-radius:30px;
overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,.45);
animation:show .35s ease;
margin-bottom:20px;
}

@keyframes show{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.post-head{
padding:15px 18px;
font-weight:900;
color:#4caf50;
font-size:15px;
}

.post img{
width:100%;
display:block;
}

.post-body{
padding:18px;
line-height:1.7;
font-size:15px;
}

.post-body b{
color:#c41c1e;
}

/* ===== RIGHT ===== */

.right{
width:370px;
background:#17191f;
border-left:1px solid rgba(255,255,255,.05);
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
gap:18px;
}

.widget{
background:#20242d;
border-radius:30px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.widget-title{
font-weight:900;
font-size:17px;
margin-bottom:18px;
display:flex;
align-items:center;
gap:10px;
}

.weather{
display:flex;
justify-content:space-between;
align-items:center;
}

.temp{
font-size:48px;
font-weight:900;
}

.weather small{
display:block;
margin-top:8px;
color:#9ca3af;
font-size:14px;
}

.weather-icon{
font-size:55px;
}

.map{
height:260px;
border-radius:24px;
overflow:hidden;
margin-top:10px;
}

.map iframe{
width:100%;
height:100%;
border:none;
}

.live-item{
background:#2a2f39;
padding:14px;
border-radius:18px;
margin-bottom:12px;
font-size:14px;
line-height:1.5;
}

/* ===== MOBILE ===== */

@media(max-width:1150px){

.right{
display:none;
}

}

@media(max-width:900px){

body{
flex-direction:column;
}

/* SIDEBAR */

.sidebar{
width:100%;
height:76px;
flex-direction:row;
padding:0 10px;
overflow-x:auto;
overflow-y:hidden;
gap:10px;
}

/* CHATS */

.chats{
width:100%;
height:calc(100vh - 76px);
}

/* CENTER MOBILE */

.center{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:100;
transform:translateX(100%);
transition:.35s;
}

.center.active{
transform:translateX(0);
}

/* BACK */

.back{
display:block;
}

/* POSTS */

.messages{
padding:18px;
}

.post{
max-width:100%;
border-radius:24px;
}

.menu-btn span{
display:none;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
B
</div>

<div class="menu-btn active" onclick="loadCategory('transport',this)">
🚌
<span>Транспорт</span>
</div>

<div class="menu-btn" onclick="loadCategory('city',this)">
📰
<span>Новини міста</span>
</div>

<div class="menu-btn" onclick="loadCategory('urgent',this)">
🚨
<span>Терміново</span>
</div>

<div class="menu-btn" onclick="loadCategory('gkh',this)">
💡
<span>ЖКГ</span>
</div>

<div class="menu-btn" onclick="loadCategory('ads',this)">
📢
<span>Оголошення</span>
</div>

</div>

<!-- CHATS -->

<div class="chats">

<div class="search">
<input type="text" placeholder="Пошук новин...">
</div>

<div class="chat-list" id="chatList">

</div>

</div>

<!-- CENTER -->

<div class="center" id="center">

<div class="topbar">

<div class="back" onclick="closeChat()">
←
</div>

<div id="topTitle">
BorykNews
</div>

</div>

<div class="messages" id="messages">

</div>

</div>

<!-- RIGHT -->

<div class="right">

<!-- WEATHER -->

<div class="widget">

<div class="widget-title">
🌤 Погода LIVE
</div>

<div class="weather">

<div>
<div class="temp" id="temp">
+23°
</div>

<small>
Бориспіль • Хмарно
</small>
</div>

<div class="weather-icon">
⛅
</div>

</div>

</div>

<!-- MAP -->

<div class="widget">

<div class="widget-title">
🗺 Карта тривог LIVE
</div>

<div class="map">

<iframe
src="https://alerts.in.ua"
allowfullscreen>
</iframe>

</div>

</div>

<!-- LIVE -->

<div class="widget">

<div class="widget-title">
📡 LIVE
</div>

<div class="live-item">
🚨 Центр Борисполя частково перекритий
</div>

<div class="live-item">
⚠️ Повітряна тривога Київщина
</div>

<div class="live-item">
💡 Відключення світла 19:00–22:00
</div>

<div class="live-item">
🚌 Маршрутки курсують із затримкою
</div>

</div>

</div>

<script>

/* ===== DATA ===== */

const news = {

transport:[
{
title:'🚌 Затримка маршруток',
text:'Через затори маршрутки курсують із затримкою.',
img:'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop'
},
{
title:'🚦 Рух біля центру ускладнений',
text:'Поліція просить обирати об’їзні шляхи.',
img:'https://images.unsplash.com/photo-1502877338535-766e1452684a?q=80&w=1200&auto=format&fit=crop'
}
],

city:[
{
title:'🏙 Новий сквер у Борисполі',
text:'У місті планують оновлення центральної зони.',
img:'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1200&auto=format&fit=crop'
},
{
title:'🎉 Міський фестиваль',
text:'На вихідних відбудеться святковий концерт.',
img:'https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1200&auto=format&fit=crop'
}
],

urgent:[
{
title:'🚨 Термінове звернення',
text:'Батьки повідомляють про ситуацію, яка потребує перевірки.',
img:'https://i.imgur.com/qj6F6Q4.jpeg'
},
{
title:'⚠️ Повітряна тривога',
text:'Жителів просять пройти в укриття.',
img:'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop'
}
],

gkh:[
{
title:'💡 Відключення світла',
text:'Планові роботи 19:00–22:00.',
img:'https://images.unsplash.com/photo-1497436072909-60f360e1d4b1?q=80&w=1200&auto=format&fit=crop'
},
{
title:'🚰 Ремонт водопроводу',
text:'Можливе зниження тиску води.',
img:'https://images.unsplash.com/photo-1516937941344-00b4e0337589?q=80&w=1200&auto=format&fit=crop'
}
],

ads:[
{
title:'📢 Продаж квартири',
text:'2-кімнатна квартира у центрі Борисполя.',
img:'https://images.unsplash.com/photo-1568605114967-8130f3a36994?q=80&w=1200&auto=format&fit=crop'
},
{
title:'🚗 Продаж авто',
text:'Оголошення від мешканців міста.',
img:'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1200&auto=format&fit=crop'
}
]

};

/* ===== LOAD CATEGORY ===== */

function loadCategory(category,btn){

document.querySelectorAll('.menu-btn')
.forEach(el=>el.classList.remove('active'));

btn.classList.add('active');

const chatList =
document.getElementById('chatList');

const messages =
document.getElementById('messages');

chatList.innerHTML='';
messages.innerHTML='';

news[category].forEach((item,index)=>{

chatList.innerHTML += `
<div class="chat-item" onclick="openPost('${category}',${index},this)">
<img src="${item.img}">
<div>
<div class="chat-name">${item.title}</div>
<div class="chat-last">${item.text}</div>
</div>
</div>
`;

});

openPost(category,0);

}

/* ===== OPEN POST ===== */

function openPost(category,index,el){

if(el){

document.querySelectorAll('.chat-item')
.forEach(i=>i.classList.remove('active'));

el.classList.add('active');

}

const item = news[category][index];

document.getElementById('topTitle')
.innerHTML = item.title;

document.getElementById('messages')
.innerHTML = `

<div class="post">

<div class="post-head">
BorykNews LIVE 🇺🇦
</div>

<img src="${item.img}">

<div class="post-body">

<b>${item.title}</b>

<br><br>

${item.text}

<br><br>

📡 Оперативні новини BorykNews

</div>

</div>

`;

if(window.innerWidth < 900){
document.getElementById('center')
.classList.add('active');
}

}

/* ===== CLOSE MOBILE ===== */

function closeChat(){
document.getElementById('center')
.classList.remove('active');
}

/* ===== WEATHER ===== */

const temp = document.getElementById('temp');

const arr = ['+22°','+23°','+24°','+25°'];

setInterval(()=>{
temp.innerHTML =
arr[Math.floor(Math.random()*arr.length)];
},4000);

/* ===== INIT ===== */

loadCategory('transport',
document.querySelector('.menu-btn'));

</script>

</body>
</html>
