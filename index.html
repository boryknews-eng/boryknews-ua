<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@600;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#070A10;
color:white;
overflow:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 20%, #ff2d5520, transparent 40%),
radial-gradient(circle at 80% 40%, #2d7dff20, transparent 45%),
radial-gradient(circle at 40% 80%, #00ffb320, transparent 50%),
linear-gradient(120deg,#070A10,#0b1220);
background-size:200% 200%;
animation:bg 14s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ================= APP ================= */
.app{
display:flex;
height:100vh;
}

/* LEFT */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

.logo{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(135deg,#ff2d55,#2d7dff);
}

.icon{
width:42px;
height:42px;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

/* LIST */
.list{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.item{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.item:hover{
background:rgba(255,255,255,0.08);
}

/* CENTER */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
padding:10px 0;
position:sticky;
top:0;
background:rgba(7,10,16,0.8);
backdrop-filter:blur(20px);
z-index:10;
}

.title{
font-family:Montserrat;
font-size:18px;
font-weight:800;
}

.status{
font-size:12px;
opacity:0.7;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:#00ff88;
display:inline-block;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* LIVE */
.live{
margin-top:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
}

/* CARD */
.card{
margin-top:10px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.box{
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
min-height:110px;
}

/* MAP */
iframe{
width:100%;
height:180px;
border-radius:14px;
border:none;
}

/* RIGHT */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
}

/* SOCIAL */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:42px;
border-radius:12px;
background:rgba(255,255,255,0.04);
display:flex;
align-items:center;
justify-content:center;
}

/* ================= MOBILE (FULL WOW MODE) ================= */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(0,0,0,0.6);
backdrop-filter:blur(25px);
border-top:1px solid rgba(255,255,255,0.08);
z-index:999;
}

.bottom div{
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* ================= MOBILE FULL SYSTEM ================= */
@media(max-width:900px){

body{
overflow:auto;
}

/* нічого не ховаємо логічно — просто складаємо вниз */
.app{
flex-direction:column;
height:auto;
}

.left,.list,.right{
width:100%;
display:flex;
}

/* LEFT як верхній bar */
.left{
flex-direction:row;
justify-content:space-around;
padding:10px 0;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* LIST full */
.list{
width:100%;
}

/* CENTER full */
.center{
width:100%;
padding:12px;
}

/* GRID 1 column */
.grid{
grid-template-columns:1fr;
}

/* MAP більше */
iframe{
height:220px;
}

/* MOBILE NAV */
.bottom{
display:grid;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- LIST -->
<div class="list">
<div class="item">Новини міста</div>
<div class="item">Транспорт</div>
<div class="item">Тривоги</div>
<div class="item">Погода</div>
<div class="item">Карта</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="header">
<div class="logo"></div>
<div>
<div class="title">BorykNews</div>
<div class="status"><span class="dot"></span>live • online</div>
</div>
</div>

<div class="live">
BorykNews LIVE • Бориспіль інформує 24/7
</div>

<div class="card">Новини: оновлено транспорт</div>
<div class="card">Терміново: повітряна тривога</div>
<div class="card">Погода: +12°C</div>

<div class="grid">

<div class="box">Transport LIVE</div>
<div class="box">Weather LIVE</div>
<div class="box">Alerts LIVE</div>
<div class="box">
<iframe src="https://alerts.in.ua/"></iframe>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>Соцмережі</h3>

<div class="social">
<a></a>
<a></a>
<a></a>
<a></a>
</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<div>News</div>
<div>Transport</div>
<div>Alerts</div>
<div>Map</div>
</div>

</body>
</html>
