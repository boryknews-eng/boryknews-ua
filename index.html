<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  background:#0b0f14;
  overflow:hidden;
}

/* ================= LEFT ================= */

.left{
  width:420px;
  display:flex;
  background:#0f1720;
  border-right:1px solid rgba(255,255,255,0.08);
}

.iconbar{
  width:78px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:14px 0;
  gap:10px;
  background:#0c131b;
}

.menu-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
  font-size:20px;
}

.side-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

/* ADS */
.left-content{
  flex:1;
  padding:14px;
  overflow:auto;
}

.ads-title{
  color:#c31f20;
  font-weight:800;
  margin-bottom:12px;
}

.ad-item{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.ad-title{
  color:#fff;
  font-weight:700;
}

.ad-text{
  color:#9fb3c8;
  font-size:13px;
  margin-top:4px;
}

/* ================= CENTER ================= */

.center{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:#111826;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-title{
  color:#fff;
  font-weight:800;
}

.post{
  width:460px;
  margin:20px auto;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

.post-img{
  height:260px;
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop') center/cover;
}

.post-content{
  padding:16px;
}

.post-title{
  color:#fff;
  font-weight:800;
}

.post-text{
  color:#9fb3c8;
  margin-top:8px;
}

/* ================= RIGHT (MAP) ================= */

.right{
  width:380px;
  display:flex;
  flex-direction:column;
  background:#0f1720;
  border-left:1px solid rgba(255,255,255,0.08);
}

.map-title{
  padding:14px;
  color:#fff;
  font-weight:800;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

.social{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.08);
}

.social a{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:#fff;
  text-decoration:none;
  font-size:13px;
}

.social a:hover{
  background:#c31f20;
}

/* ================= RESPONSIVE ================= */

@media (max-width: 1100px){

  body{
    flex-direction:column;
    overflow:auto;
  }

  .left{
    width:100%;
    height:auto;
  }

  .iconbar{
    flex-direction:row;
    width:100%;
    justify-content:space-around;
  }

  .center{
    width:100%;
  }

  .post{
    width:92%;
  }

  .right{
    width:100%;
    height:420px;
    border-left:none;
    border-top:1px solid rgba(255,255,255,0.08);
  }
}

/* MOBILE */
@media (max-width: 600px){

  body{
    flex-direction:column;
  }

  .post{
    width:95%;
  }

  .ad-item{
    min-width:220px;
  }

  .social a{
    font-size:11px;
  }

  iframe{
    height:320px;
  }
}

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

  <div class="iconbar">
    <div class="menu-btn">☰</div>
    <div class="side-btn">🏠</div>
    <div class="side-btn">📰</div>
    <div class="side-btn">📍</div>
  </div>

  <div class="left-content">

    <div class="ads-title">ОГОЛОШЕННЯ BORYK</div>

    <div class="ad-item">
      <div class="ad-title">🏠 Оренда</div>
      <div class="ad-text">Центр — 12 000 грн</div>
    </div>

    <div class="ad-item">
      <div class="ad-title">💼 Робота</div>
      <div class="ad-text">SMM / Дизайнер</div>
    </div>

    <div class="ad-item">
      <div class="ad-title">🚕 Таксі</div>
      <div class="ad-text">від 70 грн по місту</div>
    </div>

  </div>

</div>

<!-- CENTER -->
<div class="center">

  <div class="header">
    <div class="header-title">BorykNews LIVE</div>
  </div>

  <div class="post">
    <div class="post-img"></div>
    <div class="post-content">
      <div class="post-title">🚍 Ціни на проїзд змінились</div>
      <div class="post-text">Бориспіль → Баришівка — 150 грн</div>
    </div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">

  <div class="map-title">📍 Live карта</div>

  <iframe
    src="https://www.openstreetmap.org/export/embed.html?bbox=30.8%2C50.3%2C31.2%2C50.5&layer=mapnik">
  </iframe>

  <div class="social">

    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="https://t.me" target="_blank">Telegram</a>
    <a href="https://youtube.com" target="_blank">YouTube</a>

  </div>

</div>

</body>
</html>
