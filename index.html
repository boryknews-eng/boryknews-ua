<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>BorykNews Telegram</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* BASE */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0f0f13;
color:#fff;
height:100vh;
overflow:hidden;
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:340px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

/* CHAT LIST */
.chat{
display:flex;
gap:12px;
padding:14px;
align-items:center;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

.chat img{
width:46px;
height:46px;
border-radius:12px;
}

/* RIGHT SIDE */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
min-width:0;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
background:rgba(255,255,255,0.04);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:42px;
height:42px;
border-radius:12px;
}

/* ACTION BUTTONS */
.btn{
width:42px;
height:42px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
cursor:pointer;
}

/* MESSAGES */
.messages{
flex:1;
padding:14px;
overflow:auto;
padding-bottom:110px;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:12px;
margin-bottom:10px;
word-break:break-word;
}

.sent{
background:#c41c1e;
margin-left:auto;
}

.received{
background:rgba(255,255,255,0.08);
}

/* INPUT */
.input{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:8px;
padding:10px;
background:rgba(10,10,12,0.95);
border-top:1px solid rgba(255,255,255,0.08);
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
outline:none;
}

.input button{
width:46px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
cursor:pointer;
}

/* MOBILE FIX (ВАЖЛИВО) */
@media(max-width:900px){

.sidebar{
display:none;
}

.messages{
padding:12px;
padding-bottom:120px;
}

.input{
padding:8px;
}

}

/* SCROLL */
.messages::-webkit-scrollbar{
width:6px;
}

.messages::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.2);
border-radius:10px;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="chat">
<img src="https://i.pravatar.cc/100?img=5">
<div>BorykNews</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=12">
<div>Оголошення</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=32">
<div>Нерухомість</div>
</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="header">

<div class="user">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<b>BorykNews</b>
<div style="font-size:12px;color:#00ff95">● online</div>
</div>
</div>

<div>
<button class="btn">📞</button>
<button class="btn">⋮</button>
</div>

</div>

<!-- MESSAGES -->
<div class="messages">

<div class="msg received">👋 Це твій Telegram шаблон BorykNews</div>
<div class="msg sent">Так, тепер виглядає як треба 😍</div>

</div>

<!-- INPUT -->
<div class="input">

<input placeholder="Написати повідомлення...">
<button>➤</button>

</div>

</div>

</div>

<script>

Telegram.WebApp.expand();

</script>

</body>
</html>
