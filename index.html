<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>BorykNews</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #2c2a30;
      color: white;
    }

    header {
      background: #c41c1e;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .news {
      background: #ffffff;
      color: #2c2a30;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .tag {
      color: #c41c1e;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  BorykNews
</header>

<div class="container">

  <div class="news">
    <div class="tag">Бориспіль</div>
    У Бориспільській громаді триває розвиток інфраструктури та оновлення шкіл.
  </div>

  <div class="news">
    <div class="tag">Район</div>
    Нові соціальні проєкти запускаються у Бориспільському районі.
  </div>

  <div class="news">
    <div class="tag">Громада</div>
    Місцева влада оголосила плани на літній період 2026 року.
  </div>

</div>

</body>
</html>
