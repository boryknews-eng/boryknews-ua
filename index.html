<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0d12;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 40%, #1f2a44aa, transparent 45%),
           radial-gradient(circle at 40% 80%, #111a33aa, transparent 50%),
           linear-gradient(120deg,#0b0d12,#0f1424);
background-size:200% 200%;
animation:bg 14s ease-in-out infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* LEFT MENU */
.left{
width:90px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
}

/* LOGO */
.logo{
width:60px;
height:60px;
border-radius:14px;
background:rgba(255,255,255,0.05);
background-image:url("YOUR_LOGO.png");
background-size:cover;
background-position:center;
}

/* ICONS */
.icon{
width:44px;
height:44px;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:.2s;
}

.icon:hover{
background:#c41c1e;
}

/* CHAT LIST */
.chat-list{
width:300px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,0.05);
overflow:auto;
}

.chat{
display:block;
padding:14px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

/* CENTER */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:12px;
}

/* TITLE AREA */
.title-wrap{
display:flex;
flex-direction:column;
}

/* TELEGRAM STYLE FONT */
.title{
font-family:Montserrat,sans-serif;
font-size:18px;
font-weight:800;
}

/* LIVE STATUS */
.status{
font-size:12px;
opacity:0.7;
}

.dot{
display:inline-block;
width:6px;
height:6px;
border-radius:50%;
background:#00ff7f;
margin-right:6px;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.2}
}

/* LIVE BLOCK */
.live{
margin-top:12px;
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(196,28,30,0)}
50%{box-shadow:0 0 25px rgba(196,28,30,0.35)}
100%{box-shadow:0 0 0 rgba(196,28,30,0)}
}

/* NEWS */
.card{
margin-top:12px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
color:white;
text-decoration:none;
display:block;
}

/* WIDGETS */
.widgets{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.widget{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
}

/* RIGHT */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
}

/* MENU (TOGGLE) */
.menu-btn{
padding:10px;
background:rgba(255,255,255,0.04);
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
}

.menu{
display:none;
flex-direction:column;
gap:8px;
}

.menu.active{
display:flex;
}

.menu a{
padding:10px;
background:rgba(255,255,255,0.04);
border-radius:10px;
color:white;
text-decoration:none;
}

/* SOCIAL */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.04);
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.9);
border-top:1px solid rgba(255,255,255,0.06);
}

.bottom a{
height:55px;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:900px){

.left,.chat-list,.right{
display:none;
}

.bottom{
display:grid;
}

body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="logo"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- CHAT LIST -->
<div class="chat-list">

<a class="chat" href="#city">Новини міста</a>
<a class="chat" href="#transport">Транспорт</a>
<a class="chat" href="#urgent">Терміново</a>
<a class="chat" href="#map">Карта тривог</a>

</div>

<!-- CENTER -->
<div class="center">

<!-- HEADER -->
<div class="header">

<div class="logo" style="width:50px;height:50px;"></div>

<div class="title-wrap">
<div class="title">BorykNews</div>
<div class="status">
<span class="dot"></span>online • live updates
</div>
</div>

</div>

<!-- LIVE -->
<div class="live">
BorykNews LIVE Бориспіль
</div>

<!-- NEWS -->
<a class="card" href="#">Новина міста</a>
<a class="card" href="#">Термінове повідомлення</a>
<a class="card" href="#">Погода +12°C</a>

<!-- WIDGETS -->
<div class="widgets">

<div class="widget">Transport LIVE</div>

<div class="widget">Weather SLOT</div>

<div class="widget">Urgent alerts</div>

<div class="widget">
<iframe width="100%" height="120" src="https://alerts.in.ua/"></iframe>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="menu-btn" onclick="toggleMenu()">Menu</div>

<div class="menu" id="menu">

<a href="#city">Home</a>
<a href="#transport">Transport</a>
<a href="#urgent">Urgent</a>
<a href="#map">Map</a>

</div>

<div class="social">

<a href="#"><img src="icons/fb.png"></a>
<a href="#"><img src="icons/tg.png"></a>
<a href="#"><img src="icons/ig.png"></a>
<a href="#"><img src="icons/yt.png"></a>

</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<a href="#city">Home</a>
<a href="#transport">Transport</a>
<a href="#urgent">Alerts</a>
<a href="#map">Map</a>
</div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}
</script>

</body>
</html>
