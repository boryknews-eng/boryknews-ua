<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews VAU FIX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  background:#0b0f14;
  overflow:hidden;
}

/* ================= LEFT ================= */

.left{
  width:420px;
  display:flex;
  background:#0f1720;
  border-right:1px solid rgba(255,255,255,0.08);
}

.iconbar{
  width:78px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:14px 0;
  gap:10px;
  background:#0c131b;
}

.menu-btn{
  width:46px;
  height:46px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
  font-size:20px;
}

.left-content{
  flex:1;
  padding:14px;
  overflow:auto;
}

.ads-title{
  color:#c31f20;
  font-weight:800;
  margin-bottom:12px;
}

.ad{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.ad-title{
  color:#fff;
  font-weight:700;
}

.ad-text{
  color:#9fb3c8;
  font-size:13px;
}

/* ================= CENTER ================= */

.center{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  height:58px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:#111826;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.header-title{
  color:#fff;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:70%;
}

.post{
  width:460px;
  margin:20px auto;
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

.post-img{
  height:260px;
  background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop') center/cover;
}

.post-content{
  padding:16px;
}

.post-title{
  color:#fff;
  font-weight:800;
}

.post-text{
  color:#9fb3c8;
  margin-top:8px;
}

/* ================= RIGHT ================= */

.right{
  width:380px;
  display:flex;
  flex-direction:column;
  background:#0f1720;
  border-left:1px solid rgba(255,255,255,0.08);
}

.map-title{
  padding:14px;
  color:#fff;
  font-weight:800;
}

iframe{
  width:100%;
  height:100%;
  border:0;
}

/* ================= MENU ================= */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:50;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.menu{
  position:fixed;
  top:0;
  left:-300px;
  width:300px;
  height:100vh;
  background:rgba(15,23,32,0.98);
  backdrop-filter:blur(20px);
  padding:18px;
  transition:.35s;
  z-index:60;
}

.menu.active{
  left:0;
}

.menu-title{
  color:#fff;
  font-weight:800;
  margin-bottom:20px;
}

.item{
  display:flex;
  align-items:center;
  padding:12px;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  transition:.2s;
}

.item:hover{
  background:rgba(255,255,255,0.06);
  transform:translateX(4px);
}

/* ================= RESPONSIVE FIX ================= */

@media (max-width: 1100px){

  body{
    flex-direction:column;
    overflow:auto;
  }

  .left{
    width:100%;
    flex-direction:row;
    align-items:center;
  }

  .iconbar{
    flex-direction:row;
    width:100%;
    justify-content:space-around;
    padding:10px 0;
  }

  .center{
    width:100%;
  }

  .post{
    width:92%;
  }

  .right{
    width:100%;
    height:380px;
  }

  /* HEADER FIX */
  .header{
    height:52px;
    padding:0 12px;
  }

  .header-title{
    font-size:14px;
    max-width:65%;
  }
}

/* MOBILE */
@media (max-width: 600px){

  .header{
    height:48px;
    padding:0 10px;
  }

  .header-title{
    font-size:13px;
  }

  .post{
    width:95%;
  }

}

</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

  <div class="iconbar">
    <div class="menu-btn" id="menuBtn">☰</div>
    <div class="menu-btn">🏠</div>
    <div class="menu-btn">📰</div>
    <div class="menu-btn">📍</div>
  </div>

  <div class="left-content">

    <div class="ads-title">ОГОЛОШЕННЯ</div>

    <div class="ad">
      <div class="ad-title">🏠 Оренда</div>
      <div class="ad-text">Центр — 12 000 грн</div>
    </div>

    <div class="ad">
      <div class="ad-title">💼 Робота</div>
      <div class="ad-text">SMM / Дизайн</div>
    </div>

  </div>

</div>

<!-- CENTER -->
<div class="center">

  <div class="header">
    <div class="header-title">BorykNews VAU FIX</div>
  </div>

  <div class="post">
    <div class="post-img"></div>
    <div class="post-content">
      <div class="post-title">🚍 Ціни на проїзд</div>
      <div class="post-text">Бориспіль → Баришівка — 150 грн</div>
    </div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">

  <div class="map-title">📍 Live карта</div>

  <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=30.8%2C50.3%2C31.2%2C50.5&layer=mapnik"></iframe>

</div>

<!-- MENU -->
<div class="overlay" id="overlay"></div>

<div class="menu" id="menu">

  <div class="menu-title">Соцмережі</div>

  <a class="item" href="https://instagram.com" target="_blank">Instagram</a>
  <a class="item" href="https://t.me" target="_blank">Telegram</a>
  <a class="item" href="https://youtube.com" target="_blank">YouTube</a>

</div>

<script>

const menu = document.getElementById('menu');
const overlay = document.getElementById('overlay');
const btn = document.getElementById('menuBtn');

btn.onclick = () => {
  menu.classList.add('active');
  overlay.classList.add('active');
}

overlay.onclick = () => {
  menu.classList.remove('active');
  overlay.classList.remove('active');
}

</script>

</body>
</html>
