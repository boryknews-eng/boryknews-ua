<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BorykNews Messenger</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0b0b10;color:#fff;overflow:hidden;height:100vh}

/* LOGIN */
.login{
position:fixed;inset:0;
display:flex;align-items:center;justify-content:center;
background:#0b0b10;
z-index:999;
}

.login-box{
width:320px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.06);
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
}

.login-box button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
}

/* APP */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:320px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.1);
display:flex;flex-direction:column;
}

.chat{
padding:12px;
display:flex;
gap:10px;
cursor:pointer;
transition:.3s;
}

.chat:hover{background:rgba(255,255,255,0.06)}

.chat img{width:45px;height:45px;border-radius:12px}

.name{font-weight:700}

/* CHAT */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:14px;
display:flex;
align-items:center;
gap:10px;
background:rgba(255,255,255,0.04);
}

.header img{width:45px;height:45px;border-radius:12px}

/* MESSAGES */
.messages{
flex:1;
padding:15px;
overflow:auto;
}

.msg{
max-width:70%;
padding:12px;
border-radius:14px;
margin-bottom:10px;
animation:fade .3s;
}

.sent{background:#c41c1e;margin-left:auto}
.received{background:rgba(255,255,255,0.08)}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* INPUT */
.input{
display:flex;
padding:10px;
background:rgba(255,255,255,0.04);
gap:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
}

.input button{
width:50px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
}

/* TYPING */
.typing{
display:flex;
gap:5px;
padding:10px;
}

.typing span{
width:6px;height:6px;border-radius:50%;
background:#fff;
animation:bounce 1s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,100%{transform:translateY(0);opacity:.3}
50%{transform:translateY(-4px);opacity:1}
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
}

</style>

</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h2>BorykNews</h2>
<input id="name" placeholder="Введи ім'я">
<button onclick="enter()">Увійти</button>
</div>
</div>

<!-- APP -->
<div class="app" style="display:none" id="app">

<div class="sidebar">

<div class="chat" onclick="selectChat()">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<div class="name">BorykNews</div>
<div style="font-size:12px;opacity:.7">Новини Київщини</div>
</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=12">
<div>
<div class="name">Оголошення</div>
<div style="font-size:12px;opacity:.7">Робота / Нерухомість</div>
</div>
</div>

</div>

<div class="chat-area">

<div class="header">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<div id="chatName">BorykNews</div>
<div style="font-size:12px;color:#00ff95">● онлайн</div>
</div>
</div>

<div class="messages" id="messages">

<div class="msg received">🚨 Новини Борисполя оновлено</div>
<div class="msg sent">🔥 BorykNews працює в реальному часі</div>

</div>

<div class="input">

<input id="text" placeholder="Написати повідомлення...">
<button onclick="send()">➤</button>

</div>

</div>

</div>

<script>

/* LOGIN */
function enter(){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}

/* SOUND */
function sound(){
const a=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a9d1b1.mp3");
a.volume=0.3;
a.play();
}

/* MESSAGE */
function send(){

let text=document.getElementById("text").value;
if(!text)return;

let msg=document.createElement("div");
msg.className="msg sent";
msg.innerText=text;

document.getElementById("messages").appendChild(msg);

document.getElementById("text").value="";

sound();

/* typing AI */
setTimeout(()=>{
let typing=document.createElement("div");
typing.className="typing";
typing.innerHTML="<span></span><span></span><span></span>";
document.getElementById("messages").appendChild(typing);

setTimeout(()=>{
typing.remove();

let ai=document.createElement("div");
ai.className="msg received";

const news=[
"🚨 ДТП у центрі Борисполя",
"🏠 Нові квартири на сайті",
"🚌 Зміни маршрутів Київщини",
"🔥 Погода зміниться завтра"
];

ai.innerText=news[Math.floor(Math.random()*news.length)];

document.getElementById("messages").appendChild(ai);

},2000);

},500);

}

/* SWIPE CHAT (simple) */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchmove",e=>{
let diff=e.touches[0].clientX-startX;
if(diff>80){
document.querySelector(".sidebar").style.transform="translateX(0)";
}
});

/* TELEGRAM INIT */
Telegram.WebApp.expand();

</script>

</body>
</html>
