<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BorykNews Messenger</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#0b0b10;
color:#fff;
height:100vh;
overflow:hidden;
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:320px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
overflow-y:auto;
}

.chat{
display:flex;
gap:10px;
padding:12px;
cursor:pointer;
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

.chat img{
width:46px;
height:46px;
border-radius:12px;
}

.name{
font-weight:700;
}

/* CHAT AREA */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:10px;
padding:14px;
background:rgba(255,255,255,0.04);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.header img{
width:44px;
height:44px;
border-radius:12px;
}

/* MESSAGES */
.messages{
flex:1;
overflow-y:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px;
padding-bottom:90px; /* IMPORTANT FOR MOBILE */
}

.msg{
max-width:75%;
padding:12px 14px;
border-radius:14px;
word-wrap:break-word;
}

.sent{
background:#c41c1e;
margin-left:auto;
}

.received{
background:rgba(255,255,255,0.08);
}

/* INPUT */
.input{
display:flex;
gap:10px;
padding:12px;
background:rgba(255,255,255,0.04);
border-top:1px solid rgba(255,255,255,0.08);
position:sticky;
bottom:0;
}

.input input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
outline:none;
}

.input button{
width:50px;
border:none;
border-radius:12px;
background:#c41c1e;
color:#fff;
}

/* TYPING */
.typing span{
display:inline-block;
width:6px;
height:6px;
border-radius:50%;
background:#fff;
margin-right:4px;
animation:bounce 1s infinite;
}

.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,100%{transform:translateY(0);opacity:.3}
50%{transform:translateY(-4px);opacity:1}
}

/* ===================== */
/* 🔥 MOBILE WAU VERSION */
/* ===================== */

@media(max-width:900px){

.app{
flex-direction:column;
}

/* hide sidebar */
.sidebar{
display:none;
}

/* header compact */
.header{
padding:10px 12px;
}

/* messages */
.messages{
padding:12px;
padding-bottom:110px;
gap:8px;
}

/* message bubble mobile */
.msg{
max-width:85%;
padding:10px 12px;
font-size:14px;
border-radius:12px;
}

/* input FIXED like Telegram */
.input{
position:fixed;
bottom:0;
left:0;
right:0;
padding:10px;
background:rgba(10,10,12,0.95);
backdrop-filter:blur(20px);
z-index:100;
}

/* input field bigger touch */
.input input{
height:44px;
font-size:15px;
}

/* send button */
.input button{
width:46px;
height:44px;
}

/* smooth safe area for iPhone */
body{
padding-bottom:env(safe-area-inset-bottom);
}

}

/* SCROLLBAR */
::-webkit-scrollbar{
width:5px;
}

::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.15);
border-radius:10px;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="chat">
<img src="https://i.pravatar.cc/100?img=5">
<div class="name">BorykNews</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=12">
<div class="name">Оголошення</div>
</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="header">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<div><b>BorykNews</b></div>
<div style="font-size:12px;color:#00ff95">● online</div>
</div>
</div>

<div class="messages">

<div class="msg received">🚨 Новини Борисполя оновлено</div>

<div class="msg sent">🔥 BorykNews працює як Telegram</div>

<div class="msg received">🏠 Нові оголошення вже на сайті</div>

</div>

<div class="input">

<input placeholder="Написати повідомлення...">
<button>➤</button>

</div>

</div>

</div>

<script>
Telegram.WebApp.expand();
</script>

</body>
</html>
