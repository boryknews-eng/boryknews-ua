<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews LIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#0b0d12;
color:white;
overflow:hidden;
}

/* BACKGROUND ANIMATION */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 40%, #1f2a44aa, transparent 45%),
           radial-gradient(circle at 40% 80%, #111a33aa, transparent 50%),
           linear-gradient(120deg,#0b0d12,#0f1424);
background-size:200% 200%;
animation:bg 14s ease-in-out infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* LEFT ICON BAR */
.left{
width:80px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:12px;
border-right:1px solid rgba(255,255,255,0.05);
}

.icon{
width:45px;
height:45px;
border-radius:14px;
background-image:url("icons/ICON_HERE.png");
background-size:cover;
background-position:center;
cursor:pointer;
}

/* CHAT LIST */
.chat-list{
width:300px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
overflow:auto;
border-right:1px solid rgba(255,255,255,0.05);
}

.chat{
display:block;
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
transition:.2s;
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

/* CENTER */
.center{
flex:1;
overflow:auto;
padding:15px;
}

/* LIVE HEADER */
.live{
padding:16px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
text-align:center;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(196,28,30,0)}
50%{box-shadow:0 0 20px rgba(196,28,30,0.35)}
100%{box-shadow:0 0 0 rgba(196,28,30,0)}
}

/* NEWS CARD */
.card{
margin-top:12px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
text-decoration:none;
color:white;
display:block;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* WIDGET GRID */
.widgets{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.widget{
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.05);
}

/* RIGHT PANEL */
.right{
width:320px;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(20px);
border-left:1px solid rgba(255,255,255,0.05);
padding:12px;
overflow:auto;
}

/* MENU */
.menu a{
display:block;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.04);
text-decoration:none;
color:white;
margin-bottom:8px;
}

/* SOCIAL ICONS (PATHS FOR YOU) */
.social{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:12px;
}

.social a{
height:40px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.04);
text-decoration:none;
color:white;
}

.social img{
width:20px;
height:20px;
}

/* MAP SLOT */
.map{
width:100%;
height:200px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

/* MOBILE */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.9);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,0.06);
}

.bottom a{
height:55px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:white;
}

/* RESPONSIVE */
@media(max-width:900px){

.left,.chat-list,.right{
display:none;
}

.bottom{
display:grid;
}

body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="left">

<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>

</div>

<!-- CHATS -->
<div class="chat-list">

<a class="chat" href="#city">news/city</a>
<a class="chat" href="#transport">news/transport</a>
<a class="chat" href="#urgent">news/urgent</a>
<a class="chat" href="#map">alerts/map</a>

</div>

<!-- CENTER -->
<div class="center">

<div class="live">
BorykNews LIVE Borispil
<div style="opacity:0.7;font-size:12px;">24/7 system active</div>
</div>

<a class="card" id="city" href="#">
City News Feed
<img src="https://i.imgur.com/qj6F6Q4.jpeg">
</a>

<div class="widgets">

<div class="widget" id="transport">
Transport LIVE FEED SLOT
</div>

<div class="widget">
Weather LIVE SLOT (API HERE)
<div id="weather-box">loading...</div>
</div>

<div class="widget" id="urgent">
Urgent alerts system
</div>

<div class="widget" id="map">
Air Alert Map SLOT
<iframe class="map" src="https://alerts.in.ua/" ></iframe>
</div>

</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="menu">
<a href="#city">main</a>
<a href="#city">city news</a>
<a href="#urgent">urgent</a>
<a href="#transport">transport</a>
<a href="#map">map</a>
</div>

<div class="social">

<a href="#"><img src="icons/facebook.png"></a>
<a href="#"><img src="icons/telegram.png"></a>
<a href="#"><img src="icons/instagram.png"></a>
<a href="#"><img src="icons/youtube.png"></a>

</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<a href="#city">home</a>
<a href="#transport">transport</a>
<a href="#urgent">alerts</a>
<a href="#map">map</a>
</div>

</body>
</html>
