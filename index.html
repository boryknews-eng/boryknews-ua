<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BorykNews Telegram Style</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Manrope',sans-serif;
color:white;
background:#0b0d12;
overflow:hidden;
}

/* ================= ANIMATED BACKGROUND ================= */
.bg{
position:fixed;
inset:0;
z-index:-2;
background:radial-gradient(circle at 20% 20%, #c41c1e33, transparent 40%),
           radial-gradient(circle at 80% 30%, #2c2a3088, transparent 45%),
           radial-gradient(circle at 40% 80%, #1a1a3a88, transparent 50%),
           linear-gradient(120deg,#0b0d12,#111a2e,#0a0f1f);
background-size:200% 200%;
animation:moveBG 12s ease-in-out infinite;
filter:blur(0px);
}

@keyframes moveBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* glow overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* ================= APP ================= */
.app{
display:flex;
height:100vh;
}

/* ================= LEFT (Telegram style) ================= */
.left{
width:80px;
background:rgba(20,22,30,0.6);
backdrop-filter:blur(20px);
display:flex;
flex-direction:column;
align-items:center;
padding:10px 0;
gap:14px;
border-right:1px solid rgba(255,255,255,0.06);
}

.icon{
width:45px;
height:45px;
border-radius:14px;
background:rgba(255,255,255,0.05);
transition:.3s;
cursor:pointer;
}

.icon:hover{
background:#c41c1e;
transform:scale(1.05);
}

/* ================= CHAT LIST ================= */
.chats{
width:300px;
background:rgba(18,20,28,0.6);
backdrop-filter:blur(20px);
overflow:auto;
border-right:1px solid rgba(255,255,255,0.06);
}

.chat{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:.2s;
}

.chat:hover{
background:rgba(255,255,255,0.06);
}

/* ================= CENTER ================= */
.center{
flex:1;
overflow:auto;
padding:18px;
}

/* LIVE HEADER */
.live{
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
text-align:center;
border:1px solid rgba(255,255,255,0.08);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(196,28,30,0)}
50%{box-shadow:0 0 25px rgba(196,28,30,0.4)}
100%{box-shadow:0 0 0 rgba(196,28,30,0)}
}

.live h1{
font-size:20px;
font-weight:800;
}

.live p{
font-size:13px;
opacity:0.7;
}

/* ================= 4 MAIN BLOCKS ================= */
.grid4{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:15px;
}

.block{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.06);
cursor:pointer;
text-align:center;
transition:.3s;
font-size:13px;
}

.block:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.09);
}

/* ================= NEWS CARD ================= */
.post{
margin-top:15px;
border-radius:18px;
overflow:hidden;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.06);
}

.post img{
width:100%;
display:block;
}

.post .text{
padding:15px;
}

/* ================= RIGHT PANEL ================= */
.right{
width:320px;
background:rgba(18,20,28,0.6);
backdrop-filter:blur(20px);
padding:15px;
border-left:1px solid rgba(255,255,255,0.06);
}

.right h3{
margin-bottom:5px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
margin-top:10px;
}

.menu div{
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.04);
cursor:pointer;
}

/* ================= SOCIAL ================= */
.social{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.social div{
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.04);
}

/* ================= MOBILE ================= */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
display:none;
grid-template-columns:repeat(4,1fr);
background:rgba(10,12,18,0.85);
backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,0.06);
}

.bottom div{
height:55px;
display:flex;
align-items:center;
justify-content:center;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){

.left,.chats,.right{
display:none;
}

.bottom{
display:grid;
}

.grid4{
grid-template-columns:repeat(2,1fr);
}

body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="app">

<!-- LEFT -->
<div class="left">
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
<div class="icon"></div>
</div>

<!-- CHATS -->
<div class="chats">
<div class="chat">Новини міста</div>
<div class="chat">Транспорт</div>
<div class="chat">Терміново</div>
<div class="chat">Карта тривог LIVE</div>
</div>

<!-- CENTER -->
<div class="center">

<div class="live">
<h1>BorykNews LIVE Бориспіль</h1>
<p>інформує 24/7 онлайн</p>
</div>

<div class="grid4">
<div class="block">Новини міста</div>
<div class="block">Транспорт</div>
<div class="block">Терміново</div>
<div class="block">Карта тривог</div>
</div>

<div class="post">
<img src="https://i.imgur.com/qj6F6Q4.jpeg">
<div class="text">Головна новина міста в стилі Telegram</div>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<h3>BorykNews</h3>
<p>Бориспіль інформує</p>

<div class="menu">
<div>Головна</div>
<div>Новини міста</div>
<div>Терміново</div>
<div>Транспорт</div>
<div>Карта тривог</div>
</div>

<div class="social">
<div></div>
<div></div>
<div></div>
<div></div>
</div>

</div>

</div>

<!-- MOBILE -->
<div class="bottom">
<div></div>
<div></div>
<div></div>
<div></div>
</div>

</body>
</html>
