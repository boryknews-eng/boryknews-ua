<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>BorykNews Telegram</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0b0b10;color:#fff;height:100vh;overflow:hidden}

/* APP */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:320px;
background:rgba(255,255,255,0.04);
border-right:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
}

.chat{
display:flex;
gap:10px;
padding:12px;
cursor:pointer;
}

.chat img{
width:46px;height:46px;border-radius:12px;
}

/* CHAT */
.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(255,255,255,0.04);
border-bottom:1px solid rgba(255,255,255,0.08);
}

.user{
display:flex;
align-items:center;
gap:10px;
}

.user img{
width:42px;height:42px;border-radius:12px;
}

/* ACTIONS */
.actions{
display:flex;
gap:8px;
}

.btn{
width:42px;height:42px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:#fff;
cursor:pointer;
}

/* SOCIAL PANEL */
.social-panel{
display:none;
position:absolute;
top:60px;
right:10px;
background:#111;
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:10px;
z-index:999;
}

.social-panel a{
display:flex;
align-items:center;
gap:8px;
color:#fff;
text-decoration:none;
padding:8px;
}

/* MESSAGES */
.messages{
flex:1;
padding:12px;
overflow:auto;
padding-bottom:110px;
}

.msg{
max-width:75%;
padding:10px 12px;
border-radius:12px;
margin-bottom:10px;
}

.sent{background:#c41c1e;margin-left:auto}
.received{background:rgba(255,255,255,0.08)}

/* INPUT */
.input{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
gap:8px;
padding:10px;
background:rgba(10,10,12,0.95);
border-top:1px solid rgba(255,255,255,0.08);
}

.input input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:#fff;
outline:none;
}

.input button{
width:46px;
border:none;
border-radius:10px;
background:#c41c1e;
color:#fff;
}

/* QUICK SUGGESTIONS */
.suggestions{
display:flex;
gap:6px;
padding:8px;
flex-wrap:wrap;
}

.sug{
font-size:12px;
padding:6px 10px;
background:rgba(255,255,255,0.08);
border-radius:20px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:900px){
.sidebar{display:none}
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="chat">
<img src="https://i.pravatar.cc/100?img=5">
<div>BorykNews</div>
</div>

<div class="chat">
<img src="https://i.pravatar.cc/100?img=12">
<div>Оголошення</div>
</div>

</div>

<!-- CHAT -->
<div class="chat-area">

<div class="header">

<div class="user">
<img src="https://i.pravatar.cc/100?img=5">
<div>
<div><b>BorykNews</b></div>
<div style="font-size:12px;color:#00ff95">● online</div>
</div>
</div>

<div class="actions">

<!-- CALL -->
<button class="btn" onclick="window.location.href='tel:+380975973256'">📞</button>

<!-- EMAIL -->
<button class="btn" onclick="window.location.href='mailto:boryknews@gmail.com'">✉️</button>

<!-- SOCIAL -->
<button class="btn" onclick="toggleSocial()">⋮</button>

</div>

</div>

<!-- SOCIAL PANEL -->
<div class="social-panel" id="social">

<a href="https://www.instagram.com/boryknews/" target="_blank">📸 Instagram</a>
<a href="https://www.facebook.com/BorykNews/" target="_blank">📘 Facebook</a>
<a href="https://x.com/BorykNews" target="_blank">🐦 X</a>
<a href="https://t.me/BorykNews" target="_blank">✈ Telegram</a>

</div>

<!-- MESSAGES -->
<div class="messages" id="messages">

<div class="msg received">🚨 Новини Борисполя</div>
<div class="msg sent">🔥 BorykNews онлайн</div>

</div>

<!-- SUGGESTIONS -->
<div class="suggestions">

<div class="sug" onclick="fill('Доброго дня!')">Доброго дня</div>
<div class="sug" onclick="fill('Є новини?')">Є новини?</div>
<div class="sug" onclick="fill('Що сталося?')">Що сталося?</div>

</div>

<!-- INPUT -->
<div class="input">

<input id="text" placeholder="Написати..." 
onkeydown="if(event.key==='Enter')send()">

<button onclick="send()">➤</button>

</div>

</div>

</div>

<script>

function send(){

let t=document.getElementById("text");
if(!t.value)return;

let m=document.createElement("div");
m.className="msg sent";
m.innerText=t.value;

document.getElementById("messages").appendChild(m);

t.value="";
}

function fill(text){
document.getElementById("text").value=text;
}

function toggleSocial(){
let s=document.getElementById("social");
s.style.display = s.style.display==="block"?"none":"block";
}

Telegram.WebApp.expand();

</script>

</body>
</html>
